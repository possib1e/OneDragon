name: Maintenance Checks

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  python-syntax:
    name: Python syntax and CLI help
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile maintained entrypoints
        run: python -m compileall start.py module

      - name: Check CLI help
        run: python start.py --help
